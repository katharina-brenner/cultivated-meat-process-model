# Reference data from Brenner et al. (2026), Front. Nutr. 13:1844185
# Scenario 1: Main Process, 90:10 sterilization split
# doi: 10.3389/fnut.2026.1844185

reference:
  citation: "Brenner KJ et al. (2026) Decoding cultured meat manufacturing. Front. Nutr. 13:1844185"
  doi: "10.3389/fnut.2026.1844185"
  scenario: "Main Process, 90:10 split"
  batch_duration_h: 736.26
  product_mass_kg_per_batch: 2112.61
  product_entities_per_batch: 2091.69

process_parameters:
  max_cell_density_cells_mL: 5.0e7
  culture_temperature_C: 37
  doubling_time_h: 20
  culture_time_per_stage_h: 120
  inoculum_volume_mL: 2
  sterilization_split_filtration: 0.90
  sterilization_split_heat: 0.10

