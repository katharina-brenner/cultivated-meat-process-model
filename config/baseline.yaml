# Baseline scenario for cultivated meat process model

plant:
  name: baseline
  annual_production_kg: 1_000_000
  operating_days: 330

media_prep:
  batch_volume_L: 10_000
  batches_per_day: 4

seed_train:
  stages: 3
  doubling_time_h: 24
  inoculum_fraction: 0.10

production_bioreactor:
  working_volume_L: 20_000
  runs_per_day: 2
  culture_duration_h: 168
  peak_viable_cell_density: 2.0e7  # cells/mL

harvest:
  harvest_efficiency: 0.95
  wet_mass_fraction: 0.25

formulation:
  binder_fraction: 0.05
  fat_fraction: 0.08

packaging:
  pack_size_kg: 0.25
  packaging_loss: 0.01
